<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXVNC - Web Remote Desktop</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Connection Panel -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-top">
                <div>
                    <h1>NXVNC</h1>
                    <span class="subtitle">Web Remote Desktop</span>
                </div>
                <button id="btn-logout" class="btn-logout" title="Sign out">Logout</button>
            </div>
            <div id="user-info" class="user-info"></div>
            <button id="btn-admin" class="btn btn-secondary btn-admin hidden">Admin Panel</button>
        </div>

        <div class="connect-form">
            <h2>New Connection</h2>
            <div class="form-group">
                <label for="conn-name">Name</label>
                <input type="text" id="conn-name" placeholder="My Server">
            </div>
            <div class="form-group">
                <label for="conn-host">Host</label>
                <input type="text" id="conn-host" placeholder="192.168.1.100">
            </div>
            <div class="form-group">
                <label for="conn-port">Port</label>
                <input type="number" id="conn-port" value="5900" placeholder="5900">
            </div>
            <div class="form-group">
                <label for="conn-password">Password</label>
                <input type="password" id="conn-password" placeholder="VNC password">
            </div>
            <div class="form-group">
                <label for="conn-protocol">Protocol</label>
                <select id="conn-protocol">
                    <option value="vnc">VNC</option>
                </select>
            </div>
            <div class="form-actions">
                <button id="btn-connect" class="btn btn-primary">Connect</button>
                <button id="btn-save" class="btn btn-secondary">Save</button>
            </div>
        </div>

        <!-- Settings -->
        <div class="settings-panel">
            <button class="settings-toggle" id="settings-toggle">
                <span>Settings</span>
                <span class="settings-arrow" id="settings-arrow">&#9662;</span>
            </button>

            <div id="settings-body" class="settings-body hidden">
                <!-- Display & Quality -->
                <div class="settings-section">
                    <h3 class="settings-section-title">Display &amp; Quality</h3>
                    <div class="form-group">
                        <label for="set-quality">Quality Level: <span id="set-quality-val">6</span></label>
                        <input type="range" id="set-quality" min="0" max="9" value="6">
                    </div>
                    <div class="form-group">
                        <label for="set-compression">Compression Level: <span id="set-compression-val">2</span></label>
                        <input type="range" id="set-compression" min="0" max="9" value="2">
                    </div>
                    <div class="form-group">
                        <label for="set-color-depth">Color Depth</label>
                        <select id="set-color-depth">
                            <option value="24">24-bit True Color</option>
                            <option value="8">8-bit (Low Bandwidth)</option>
                        </select>
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-video-streaming">Prefer H.264 (if supported)</label>
                        <input type="checkbox" id="set-video-streaming" checked>
                    </div>
                </div>

                <!-- Scaling & Layout -->
                <div class="settings-section">
                    <h3 class="settings-section-title">Scaling &amp; Layout</h3>
                    <div class="form-group">
                        <label for="set-scale-mode">Scale Mode</label>
                        <select id="set-scale-mode">
                            <option value="fit">Scale to Fit</option>
                            <option value="manual">Manual Zoom</option>
                            <option value="none">None (1:1)</option>
                        </select>
                    </div>
                    <div class="form-group" id="zoom-group" style="display:none">
                        <label for="set-zoom">Zoom: <span id="set-zoom-val">100</span>%</label>
                        <input type="range" id="set-zoom" min="25" max="200" step="5" value="100">
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-resize-session">Resize Remote to Window</label>
                        <input type="checkbox" id="set-resize-session">
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-clip-viewport">Clip Viewport (Scrollbars)</label>
                        <input type="checkbox" id="set-clip-viewport">
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-lock-aspect">Lock Aspect Ratio</label>
                        <input type="checkbox" id="set-lock-aspect" checked>
                    </div>
                </div>

                <!-- Performance -->
                <div class="settings-section">
                    <h3 class="settings-section-title">Performance</h3>
                    <div class="form-group">
                        <label for="set-framerate">Frame Rate Limit</label>
                        <select id="set-framerate">
                            <option value="0">Unlimited</option>
                            <option value="60">60 FPS</option>
                            <option value="30">30 FPS</option>
                            <option value="15">15 FPS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="set-cursor">Cursor Mode</label>
                        <select id="set-cursor">
                            <option value="local">Local (Fast)</option>
                            <option value="remote">Remote (Accurate)</option>
                            <option value="hidden">Hidden</option>
                        </select>
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-shared">Shared Session</label>
                        <input type="checkbox" id="set-shared" checked>
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-reconnect">Auto-Reconnect</label>
                        <input type="checkbox" id="set-reconnect">
                    </div>
                    <div class="form-group" id="reconnect-delay-group" style="display:none">
                        <label for="set-reconnect-delay">Reconnect Delay (seconds)</label>
                        <input type="number" id="set-reconnect-delay" min="1" max="60" value="3">
                    </div>
                </div>

                <!-- Input -->
                <div class="settings-section">
                    <h3 class="settings-section-title">Input</h3>
                    <div class="form-group form-group-toggle">
                        <label for="set-view-only">View Only</label>
                        <input type="checkbox" id="set-view-only">
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-keyboard-grab">Keyboard Grab</label>
                        <input type="checkbox" id="set-keyboard-grab">
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-touch-mode">Touch Input Mode</label>
                        <input type="checkbox" id="set-touch-mode">
                    </div>
                </div>

                <!-- Connection -->
                <div class="settings-section">
                    <h3 class="settings-section-title">Connection</h3>
                    <div class="form-group">
                        <label for="set-timeout">Connection Timeout (seconds)</label>
                        <input type="number" id="set-timeout" min="5" max="120" value="30">
                    </div>
                    <div class="form-group form-group-toggle">
                        <label for="set-ws-compression">WebSocket Compression</label>
                        <input type="checkbox" id="set-ws-compression">
                    </div>
                </div>
            </div>
        </div>

        <div class="saved-connections">
            <h2>Saved Connections</h2>
            <div id="connections-list" class="connections-list">
                <p class="empty-state">No saved connections</p>
            </div>
        </div>
    </div>

    <!-- Toggle sidebar button -->
    <button id="btn-toggle-sidebar" class="toggle-sidebar" title="Toggle sidebar">&#9776;</button>

    <!-- Toolbar -->
    <div id="toolbar" class="toolbar hidden">
        <div class="toolbar-left">
            <span id="connection-info" class="connection-info"></span>
        </div>
        <div class="toolbar-right">
            <button id="btn-keys" class="toolbar-btn" title="Send special keys">Keys</button>
            <button id="btn-clipboard" class="toolbar-btn" title="Clipboard">Clipboard</button>
            <button id="btn-fullscreen" class="toolbar-btn" title="Fullscreen">Fullscreen</button>
            <button id="btn-scale" class="toolbar-btn" title="Scale to fit">Scale</button>
            <button id="btn-disconnect" class="toolbar-btn btn-danger" title="Disconnect">Disconnect</button>
        </div>
    </div>

    <!-- VNC Canvas Container -->
    <div id="vnc-container" class="vnc-container">
        <div id="vnc-status" class="vnc-status">
            <p>Enter connection details and click Connect</p>
        </div>
        <div id="vnc-screen" class="vnc-screen hidden"></div>
    </div>

    <!-- Clipboard Modal -->
    <div id="clipboard-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Clipboard</h3>
                <button class="modal-close" data-modal="clipboard-modal">&times;</button>
            </div>
            <textarea id="clipboard-text" rows="6" placeholder="Paste text here to send to remote, or copy text from remote"></textarea>
            <div class="modal-actions">
                <button id="btn-clipboard-send" class="btn btn-primary">Send to Remote</button>
                <button id="btn-clipboard-clear" class="btn btn-secondary">Clear</button>
            </div>
        </div>
    </div>

    <!-- Special Keys Modal -->
    <div id="keys-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Send Special Keys</h3>
                <button class="modal-close" data-modal="keys-modal">&times;</button>
            </div>
            <div class="special-keys">
                <button class="key-btn" data-keys="ctrl+alt+del">Ctrl+Alt+Del</button>
                <button class="key-btn" data-keys="ctrl+alt+f1">Ctrl+Alt+F1</button>
                <button class="key-btn" data-keys="ctrl+alt+f2">Ctrl+Alt+F2</button>
                <button class="key-btn" data-keys="tab">Tab</button>
                <button class="key-btn" data-keys="escape">Escape</button>
                <button class="key-btn" data-keys="ctrl+c">Ctrl+C</button>
                <button class="key-btn" data-keys="ctrl+v">Ctrl+V</button>
                <button class="key-btn" data-keys="ctrl+z">Ctrl+Z</button>
                <button class="key-btn" data-keys="super">Super (Win)</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
